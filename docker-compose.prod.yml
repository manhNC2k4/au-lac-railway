services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  flyway:
    image: flyway/flyway:9-alpine
    command: -configFiles=/flyway/conf/flyway.conf -locations=filesystem:/flyway/sql migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backend/flyway/sql:/flyway/sql
      - ./backend/flyway/conf:/flyway/conf
    depends_on:
      db:
        condition: service_healthy

  backend:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-backend:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MIN_SEAT_CHANGE_DWELL_MIN: ${MIN_SEAT_CHANGE_DWELL_MIN:-3}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      flyway:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-frontend:${IMAGE_TAG:-latest}
    environment:
      API_SERVER_URL: http://backend:8000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
