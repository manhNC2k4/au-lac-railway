# BE3 · Ràng buộc guardrail + CSXH KHAI BÁO. Giá trị THỰC dùng lúc chạy lấy từ
# seed/pricing_policy.json (BE1 commit, có policy_version để rollback). File này là
# SHAPE + fallback default cho test đơn vị của BE3 khi chưa nạp policy từ seed.
#
# CSXH (Điều 40 NĐ 16/2026): áp SAU giá động, lấy MAX một mức, KHÔNG cộng dồn (∏).
version: 1
guardrail:
  floor_ratio: 0.55       # sàn = 0.55 * F0
  ceiling_ratio: 1.6      # trần = 1.6 * F0
  max_delta_ratio: 0.05   # chỉ chặn khi có giá công bố trước (re-price step)
csxh:
  - doi_tuong: NGUOI_CAO_TUOI
    muc_giam_ty_le: 0.15
  - doi_tuong: NGUOI_KHUYET_TAT
    muc_giam_ty_le: 0.25
  - doi_tuong: TRE_EM
    muc_giam_ty_le: 0.10
  - doi_tuong: NGUOI_CO_CONG
    muc_giam_ty_le: 0.30
