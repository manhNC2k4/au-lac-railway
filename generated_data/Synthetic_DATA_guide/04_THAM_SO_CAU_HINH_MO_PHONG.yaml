# 15. RÀNG BUỘC CỨNG (hard gate — vi phạm = dataset/nghiệm KHÔNG hợp lệ)
# =============================================================================
rang_buoc_cung:
  - "∀e,c: da_ban + dang_giu <= suc_chua"
  - "∀ chỗ k: các khoảng trong Π_k đôi một rời nhau"
  - "gia_san <= gia_cuoi <= gia_tran"
  - "Giảm CSXH áp SAU mọi δ động, dùng MAX không cộng dồn"
  - "Đối tượng ưu tiên (cao tuổi/khuyết tật/trẻ đi một mình/cần trợ giúp) => so_lan_doi_cho = 0"
  - "so_lan_doi_cho > 0 CHỈ KHI không còn chỗ liên tục nào tại thời điểm đó"
  - "Đề xuất đổi chỗ phải được khách xác nhận đồng ý (có thể bị từ chối)"
  - "Giá KHÔNG phụ thuộc số lần tìm kiếm, thiết bị, hay bất kỳ đặc trưng cá nhân nhạy cảm nào"
  - "Giá đã giữ chỗ => bất biến"
  - "|Δp| mỗi lần điều chỉnh <= 5%"
  - "Không feature nào từ _ground_truth/ được dùng để huấn luyện"
  - "Không dữ liệu cá nhân thật ở bất kỳ đâu trong dataset"
