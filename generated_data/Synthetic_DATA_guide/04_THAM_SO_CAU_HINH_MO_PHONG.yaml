      ca_nhan: {gia_dong_per_km: 950, toc_do_kmh: 50, gioi_han_km: 400}
    ghi_chu: "Thị phần đường sắt PHẢI tự sinh ra dạng: thấp <150km, đỉnh 300-1000km, giảm >1200km"

  bat_doi_xung_chieu:     # ⭐ suy ra từ chính sách giảm giá 'chiều rỗng' của VNR
