    truoc_tet:  {chieu_nang: CHAN, dinh_tau: -7, sigma: 5}    # SG -> Bắc/Trung
    sau_tet:    {chieu_nang: LE,   dinh_tau:  6, sigma: 6}    # Bắc/Trung -> SG
    ghi_chu: "VNR giảm 5-15% cho chiều LẺ trước Tết và CHẴN sau Tết => đó là chiều RỖNG."

  luong_dac_thu_vn:       # bắt buộc — luồng công nhân KCN chi phối ma trận O-D Tết
