    - {to: DUONG_BO,   mu: 0.80}
    - {to: KHONG_DI,   mu: 1.00}
  rang_buoc_ly_thuyet: "0 < mu <= 1 với MỌI tổ — nếu mu > 1 => đạo hàm chéo sai dấu => dữ liệu PHI VẬT LÝ"
  beta:
    gia:       2.4      # [FIT] trên giá chuẩn hóa theo thu nhập phân khúc
    lech_gio:  0.06     # /giờ lệch so với giờ mong muốn
    di_dem:   -0.35     # âm = ưa thích (tiết kiệm 1 đêm khách sạn)
    doi_cho:   1.20     # ⭐ chi phí phi thỏa dụng mỗi lần đổi chỗ
  chap_nhan_doi_cho:    # sigma(zeta0 - zeta1*M - zeta2*dem - zeta3*tre_nho)
    zeta0: 1.10
    zeta1: 1.60
    zeta2: 0.90
    zeta3: 1.40
  thu_hoi:              # recapture khi bị từ chối
    sang_tau_khac_cung_ngay: 0.35
    sang_ngay_khac:          0.20
    sang_loai_cho_khac:      0.25
    roi_bo:                  0.20

