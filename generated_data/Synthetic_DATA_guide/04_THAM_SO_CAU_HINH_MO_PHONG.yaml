  theta:  0.87          # [FIT] cước lũy thoái; ước lượng bằng hồi quy log-log trên biểu giá cào
  neo_kiem_tra:         # [THẬT] — bắt buộc khớp ±3%
    - {mac_tau: SE1, od: [HNO, SGO], loai_cho: NGOI_MEM_DH, gia: 1152000}
