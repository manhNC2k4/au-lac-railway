    gamma2: 0.65          # [FIT] số mũ hấp dẫn đích  (đích quan trọng hơn cho du lịch)
    ma_sat: {theta_d: 0.95, d0_km: 2500}    # f(d) = d^theta_d * exp(d/d0)

  phan_khuc:              # pi_g — tỷ trọng, phụ thuộc lịch (giá trị ngày thường)
    - {ma: CONG_VU,  ty_trong: 0.12, beta_cost: 0.6, beta_time: 1.4, ghi_chu: "ít nhạy giá"}
    - {ma: VE_QUE,   ty_trong: 0.30, beta_cost: 1.5, beta_time: 0.6}
    - {ma: DU_LICH,  ty_trong: 0.33, beta_cost: 1.2, beta_time: 0.9}
    - {ma: THAM_THAN,ty_trong: 0.15, beta_cost: 1.3, beta_time: 0.7}
    - {ma: HSSV,     ty_trong: 0.10, beta_cost: 2.0, beta_time: 0.5, ghi_chu: "nhạy giá nhất"}
  phan_khuc_tet:          # override trong cửa sổ |tau| <= 21
    VE_QUE:  0.62
    THAM_THAN: 0.18
    DU_LICH: 0.12
    CONG_VU: 0.04
    HSSV:    0.04
    ghi_chu: "⭐ Tết: beta_cost hiệu dụng GIẢM (buộc phải về) => ít co giãn giá.
              Neo thực tế: giá Tết +4..5% mà sản lượng vẫn +9,5%."

  mode_logit:
    ASC: {sat: 0.0, bay: 0.9, bo: 0.4, ca_nhan: -0.2}    # [FIT]
    doi_thu:
      bay:  {chi_ap_dung_cu_ly_km_tu: 500,  gia_dong_per_km: 1450, thoi_gian_gio_co_dinh: 3.5}   # [GIẢ] gồm ra/vào sân bay
